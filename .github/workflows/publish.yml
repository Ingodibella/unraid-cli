name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PREVIOUS_VERSION=""

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(git show HEAD^:package.json | node -p "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync(0,'utf8')); pkg.version" || true)
          fi

          if [ -n "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version already changed in source: $PREVIOUS_VERSION -> $CURRENT_VERSION"
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            npm version patch --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            git add package.json package-lock.json
            git commit -m "chore(release): v$NEW_VERSION"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

          VERSION=$(node -p "require('./package.json').version")
          git tag "v$VERSION"

      - name: Configure npm auth
        run: npm config set "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN"

      - name: Publish package
        run: npm publish

      - name: Push release commit and tags
        run: git push origin main --follow-tags
